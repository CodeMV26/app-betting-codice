name: 1. Fase Pre-Match - Genera Pronostici

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pre-match:
    runs-on: ubuntu-latest
    steps:
      - name: Sincronizza Codice
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installa Librerie
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests openpyxl xlsxwriter numpy

      - name: Esegui Estrattore e Motore
        run: |
          python modulo_01_estrattore.py
          python modulo_02_motore.py

      - name: Salva Automaticamente i File Excel su GitHub
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add --all *.xlsx
          git commit -m "Aggiornamento database e pronostici (Fase Pre-Match)" || echo "Nessuna modifica da caricare"
          git push origin main || echo "Push non riuscito o non necessario"
