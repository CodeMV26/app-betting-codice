name: Esegui Moduli App Betting

on:
  workflow_dispatch:

jobs:
  run-modules:
    runs-on: ubuntu-latest
    steps:
      - name: Sincronizza Codice
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installa Librerie
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests openpyxl xlsxwriter numpy

      - name: Avvia Estrattore e Motore
        run: |
          python modulo_01_estrattore.py
          python modulo_02_motore.py
