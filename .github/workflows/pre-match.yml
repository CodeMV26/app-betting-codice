name: Esecuzione Moduli Pre-Match

on:
  workflow_dispatch: # Questo permette al pulsante dell'iPhone di attivare il flusso

jobs:
  run-modules:
    runs-on: ubuntu-latest

    steps:
    - name: Accedi ai file del progetto
      uses: actions/checkout@v3

    - name: Configura Python sul server
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Installa le librerie necessarie
      run: |
        pip install pandas openpyxl requests

    - name: Avvia il Modulo 01 (Estrattore Reale)
      run: python modulo_01_estrattore.py

    - name: Avvia il Modulo 02 (Motore Matematico)
      run: python modulo_02_motore.py

    - name: Salva e pubblica i dati aggiornati
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add Database_App_Betting.xlsx Pronostici_App_Betting.xlsx || true
        git commit -m "Aggiornamento dati reali da pulsante iPhone" || true
        git push origin main || true
